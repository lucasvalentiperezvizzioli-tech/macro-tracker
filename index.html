<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MacroApp – Mi Día</title>

  <!-- Tailwind (sólo por si se necesita, el app usa inline styles) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React + ReactDOM (UMD, production) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone (transpila JSX en el browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #09090e; color: #eee; font-family: 'Inter', system-ui, sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    // ─── CONSTANTS ────────────────────────────────────────────────────────────
    const PROFILE_KEY = "macro_calc_profile_v1";
    const LOG_KEY     = "macro_calc_log_v1";
    const GOAL_KEY    = "macro_calc_goal_v1";
    const DEFAULTS    = { age: 28, weight: 75, height: 184, gender: "male", activity: 2 };

    const ACTIVITY_LEVELS = [
      { id:"sedentary", label:"Sedentario", desc:"Poco o ningún ejercicio",      factor:1.2   },
      { id:"light",     label:"Ligero",     desc:"Ejercicio 1–3 días/semana",    factor:1.375 },
      { id:"moderate",  label:"Moderado",   desc:"Ejercicio 3–5 días/semana",    factor:1.55  },
      { id:"active",    label:"Activo",     desc:"Ejercicio 6–7 días/semana",    factor:1.725 },
      { id:"athlete",   label:"Atleta",     desc:"Entrenamiento intenso diario", factor:1.9   },
    ];

    const GOAL_PROFILES = [
      { id:"cut",      label:"Definición",    emoji:"🔻", factor:0.80, color:"#f87171", gradient:"linear-gradient(135deg,rgba(248,113,113,0.15),rgba(239,68,68,0.05))",   border:"rgba(248,113,113,0.25)" },
      { id:"maintain", label:"Mantenimiento", emoji:"⚖️",  factor:1.00, color:"#00d4aa", gradient:"linear-gradient(135deg,rgba(0,212,170,0.12),rgba(0,168,138,0.04))",     border:"rgba(0,212,170,0.25)"   },
      { id:"bulk",     label:"Volumen",       emoji:"📈", factor:1.15, color:"#a78bfa", gradient:"linear-gradient(135deg,rgba(167,139,250,0.15),rgba(139,92,246,0.05))", border:"rgba(167,139,250,0.25)" },
    ];

    const QUICK_FOODS = [
      { id:"qf-1", name:"Pechuga de Pollo", emoji:"🍗", kcal:165, protein:31,  fat:3.6, carbs:0   },
      { id:"qf-2", name:"Arroz Blanco",     emoji:"🍚", kcal:130, protein:2.7, fat:0.3, carbs:28  },
      { id:"qf-3", name:"Huevo Entero",     emoji:"🥚", kcal:155, protein:13,  fat:11,  carbs:1.1 },
      { id:"qf-4", name:"Salmón",           emoji:"🐟", kcal:208, protein:20,  fat:13,  carbs:0   },
      { id:"qf-5", name:"Brócoli",          emoji:"🥦", kcal:34,  protein:2.8, fat:0.4, carbs:6.6 },
      { id:"qf-6", name:"Avena",            emoji:"🌾", kcal:389, protein:17,  fat:7,   carbs:66  },
      { id:"qf-7", name:"Aguacate",         emoji:"🥑", kcal:160, protein:2,   fat:15,  carbs:9   },
      { id:"qf-8", name:"Atún en Lata",     emoji:"🐡", kcal:116, protein:26,  fat:1,   carbs:0   },
    ];

    // ─── STORAGE HELPER ───────────────────────────────────────────────────────
    const ls = {
      get: (k)    => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
      set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
      del: (k)    => { try { localStorage.removeItem(k); }                 catch {} },
    };

    // ─── PURE HELPERS ─────────────────────────────────────────────────────────
    function todayKey() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    }

    function loadProfile() {
      const p = ls.get(PROFILE_KEY);
      if (!p) return null;
      const { age, weight, height, gender, activity } = p;
      const valid =
        typeof age      === "number" && age >= 15 && age <= 80 &&
        typeof weight   === "number" && weight > 0 && weight <= 300 &&
        typeof height   === "number" && height > 0 && height <= 250 &&
        typeof activity === "number" && activity >= 0 && activity < ACTIVITY_LEVELS.length &&
        (gender === "male" || gender === "female");
      return valid ? p : null;
    }

    function loadLog() {
      const raw = ls.get(LOG_KEY);
      if (!raw || raw.date !== todayKey()) return { date: todayKey(), entries: [] };
      return raw;
    }

    function scaleMacros(food, grams) {
      const ratio = grams / 100;
      return {
        ...food,
        kcal:    parseFloat((food.kcal    * ratio).toFixed(1)),
        protein: parseFloat((food.protein * ratio).toFixed(1)),
        fat:     parseFloat((food.fat     * ratio).toFixed(1)),
        carbs:   parseFloat((food.carbs   * ratio).toFixed(1)),
        grams,
      };
    }

    function mapProducts(products = []) {
      return products
        .map(p => {
          const n = p.nutriments || {};
          return {
            id:      `off-${p.id ?? Math.random()}`,
            name:    p.product_name?.trim() || "Sin nombre",
            brand:   p.brands || "",
            kcal:    parseFloat(n["energy-kcal_100g"])  || 0,
            protein: parseFloat(n["proteins_100g"])      || 0,
            fat:     parseFloat(n["fat_100g"])           || 0,
            carbs:   parseFloat(n["carbohydrates_100g"]) || 0,
            emoji:   "🔍",
          };
        })
        .filter(p => p.kcal > 0);
    }

    // ─── API CLIENTS ──────────────────────────────────────────────────────────
    const OFF_TIMEOUT_MS = 12000;

    async function searchOFF(query, signal) {
      const q    = encodeURIComponent(query.trim());
      const base = `https://world.openfoodfacts.org/cgi/search.pl?action=process&search_terms=${q}&json=1`;
      const hdrs = { "Accept":"application/json", "User-Agent":"MacroCalc_V2" };
      const fetchJSON = (url, sig) => fetch(url, { signal:sig, headers:hdrs }).then(r => r.json());
      let data;
      try {
        data = await fetchJSON(`${base}&page_size=24`, signal);
      } catch(e) {
        if (e.name === "AbortError") throw e;
        const fc = new AbortController();
        data = await fetchJSON(base, fc.signal);
      }
      return mapProducts(data.products);
    }

    async function lookupBarcode(code) {
      const url = `https://world.openfoodfacts.org/api/v0/product/${code}.json`;
      const res = await fetch(url, { headers:{ "Accept":"application/json", "User-Agent":"MacroCalc_V2" } });
      const data = await res.json();
      if (data.status !== 1 || !data.product) return null;
      const p = data.product;
      const n = p.nutriments || {};
      const food = {
        id:      `off-${code}`,
        name:    p.product_name?.trim() || "Sin nombre",
        brand:   p.brands || "",
        kcal:    parseFloat(n["energy-kcal_100g"])  || 0,
        protein: parseFloat(n["proteins_100g"])      || 0,
        fat:     parseFloat(n["fat_100g"])           || 0,
        carbs:   parseFloat(n["carbohydrates_100g"]) || 0,
        emoji:   "🏷️",
      };
      return food.kcal > 0 ? food : null;
    }

    // ─── BARCODE SCANNER MODAL ────────────────────────────────────────────────
    function BarcodeScannerModal({ onDetected, onCancel }) {
      const videoRef    = useRef(null);
      const streamRef   = useRef(null);
      const rafRef      = useRef(null);
      const detectorRef = useRef(null);
      const [status, setStatus]         = useState("starting");
      const [errorMsg, setErrorMsg]     = useState("");
      const [manualCode, setManualCode] = useState("");

      const stopCamera = useCallback(() => {
        cancelAnimationFrame(rafRef.current);
        streamRef.current?.getTracks().forEach(t => t.stop());
        streamRef.current = null;
      }, []);

      useEffect(() => {
        let cancelled = false;

        async function init() {
          let stream;
          try {
            stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode:{ ideal:"environment" }, width:{ ideal:1280 } },
              audio: false,
            });
          } catch(err) {
            if (!cancelled) { setStatus("error"); setErrorMsg("Permiso de cámara denegado. Usa el campo manual."); }
            return;
          }
          if (cancelled) { stream.getTracks().forEach(t => t.stop()); return; }
          streamRef.current = stream;
          if (videoRef.current) { videoRef.current.srcObject = stream; await videoRef.current.play().catch(()=>{}); }

          if ("BarcodeDetector" in window) {
            detectorRef.current = new window.BarcodeDetector({
              formats:["ean_13","ean_8","upc_a","upc_e","code_128","code_39","qr_code"],
            });
            if (!cancelled) setStatus("scanning");
            const scan = async () => {
              if (cancelled || !videoRef.current) return;
              try {
                const codes = await detectorRef.current.detect(videoRef.current);
                if (codes.length > 0) { stopCamera(); onDetected(codes[0].rawValue); return; }
              } catch(_) {}
              rafRef.current = requestAnimationFrame(scan);
            };
            rafRef.current = requestAnimationFrame(scan);
          } else {
            if (!document.getElementById("h5qr-script")) {
              const s = Object.assign(document.createElement("script"), {
                id:"h5qr-script",
                src:"https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js",
              });
              document.head.appendChild(s);
              await new Promise((res, rej) => { s.onload=res; s.onerror=rej; }).catch(()=>{});
            }
            if (cancelled || !window.Html5Qrcode) {
              if (!cancelled) { setStatus("error"); setErrorMsg("Escáner no disponible en este navegador. Usa el campo manual."); }
              return;
            }
            stream.getTracks().forEach(t => t.stop());
            if (!cancelled) setStatus("scanning");
            const qr = new window.Html5Qrcode("h5qr-region");
            detectorRef.current = qr;
            try {
              await qr.start(
                { facingMode:"environment" },
                { fps:10, qrbox:{ width:240, height:160 } },
                (code) => { qr.stop().catch(()=>{}); if (!cancelled) onDetected(code); },
                () => {}
              );
            } catch(e) {
              if (!cancelled) { setStatus("error"); setErrorMsg("No se pudo iniciar el escáner."); }
            }
          }
        }

        init();
        return () => {
          cancelled = true;
          stopCamera();
          if (detectorRef.current?.stop) detectorRef.current.stop().catch(()=>{});
        };
      }, [onDetected, stopCamera]);

      const handleManual = () => {
        const code = manualCode.trim();
        if (!code) return;
        stopCamera();
        onDetected(code);
      };

      return (
        <div onClick={onCancel} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.95)", backdropFilter:"blur(16px)", zIndex:10000, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px" }}>
          <div onClick={e => e.stopPropagation()} style={{ width:"100%", maxWidth:"400px", background:"#0d0d14", border:"1px solid #2a2a35", borderRadius:"28px", overflow:"hidden", boxShadow:"0 24px 80px rgba(0,0,0,0.9)" }}>

            <div style={{ padding:"18px 20px 14px", display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:"1px solid #1a1a25" }}>
              <div>
                <h3 style={{ margin:0, fontSize:"15px", fontWeight:"800", color:"#fff", letterSpacing:"-0.01em" }}>▐▌▌ Escáner de código</h3>
                <p style={{ margin:"3px 0 0", fontSize:"11px", color:"#444" }}>
                  {status==="starting"?"Iniciando cámara…":status==="scanning"?"Apunta al código de barras":status==="error"?"Cámara no disponible":""}
                </p>
              </div>
              <button type="button" onClick={onCancel} style={{ width:"30px", height:"30px", borderRadius:"9px", background:"#1a1a25", border:"none", color:"#555", cursor:"pointer", fontSize:"13px" }}>✕</button>
            </div>

            <div style={{ position:"relative", background:"#000", aspectRatio:"4/3", overflow:"hidden" }}>
              <video ref={videoRef} muted playsInline style={{ width:"100%", height:"100%", objectFit:"cover", display:status==="error"?"none":"block" }} />
              <div id="h5qr-region" style={{ width:"100%", height:"100%", position:"absolute", inset:0 }} />

              {status==="scanning" && (
                <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", pointerEvents:"none" }}>
                  <div style={{ width:"220px", height:"130px", border:"2px solid #00d4aa", borderRadius:"10px", boxShadow:"0 0 0 9999px rgba(0,0,0,0.4), 0 0 20px rgba(0,212,170,0.3)" }} />
                  <div style={{ position:"absolute", bottom:"24%", fontSize:"10px", color:"#00d4aa", letterSpacing:"0.1em" }}>ALINEANDO…</div>
                </div>
              )}

              {status==="error" && (
                <div style={{ position:"absolute", inset:0, background:"#0d0d14", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:"10px", padding:"20px" }}>
                  <div style={{ fontSize:"30px" }}>📵</div>
                  <p style={{ color:"#f87171", fontSize:"12px", textAlign:"center", margin:0 }}>{errorMsg}</p>
                </div>
              )}

              {status==="starting" && (
                <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <div style={{ width:"32px", height:"32px", border:"3px solid #1a1a25", borderTop:"3px solid #00d4aa", borderRadius:"50%", animation:"spin 0.8s linear infinite" }} />
                </div>
              )}
            </div>

            <div style={{ padding:"14px 18px 18px" }}>
              <p style={{ fontSize:"10px", color:"#444", textTransform:"uppercase", letterSpacing:"0.06em", margin:"0 0 7px" }}>O introduce el código manualmente</p>
              <div style={{ display:"flex", gap:"7px" }}>
                <input
                  type="text" inputMode="numeric" placeholder="Ej: 8410076472824"
                  value={manualCode} onChange={e => setManualCode(e.target.value)}
                  onKeyDown={e => e.key==="Enter" && handleManual()}
                  style={{ flex:1, padding:"11px 13px", background:"#161620", border:"1px solid #2a2a35", borderRadius:"12px", color:"#fff", fontSize:"14px", outline:"none" }}
                />
                <button type="button" onClick={handleManual}
                  style={{ padding:"11px 15px", borderRadius:"12px", background:"#00d4aa", border:"none", color:"#000", fontWeight:"800", cursor:"pointer", fontSize:"13px", flexShrink:0 }}>
                  Buscar
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── PROFILE MODAL ────────────────────────────────────────────────────────
    function ProfileModal({ profile, onSave, onCancel }) {
      const [draft, setDraft] = useState({
        age:      String(profile.age),
        weight:   String(profile.weight),
        height:   String(profile.height),
        gender:   profile.gender,
        activity: profile.activity,
      });
      const set = (key, val) => setDraft(prev => ({ ...prev, [key]:val }));

      const preview = useMemo(() => {
        const age = parseFloat(draft.age), weight = parseFloat(draft.weight), height = parseFloat(draft.height);
        if (!age || !weight || !height) return null;
        const factor = ACTIVITY_LEVELS[draft.activity]?.factor ?? 1.2;
        const base   = 10 * weight + 6.25 * height - 5 * age;
        const bmr    = draft.gender === "male" ? base + 5 : base - 161;
        return Math.round(bmr * factor);
      }, [draft]);

      const isValid = useMemo(() => {
        const age = parseFloat(draft.age), weight = parseFloat(draft.weight), height = parseFloat(draft.height);
        return age >= 15 && age <= 80 && weight > 0 && weight <= 300 && height > 0 && height <= 250;
      }, [draft]);

      const fieldErr = (key, min, max) => {
        const v = parseFloat(draft[key]);
        return draft[key] !== "" && (isNaN(v) || v < min || v > max);
      };

      const iStyle = (err) => ({
        width:"100%", padding:"12px 13px", background:"#161620",
        border:`1px solid ${err?"#f87171":"#2a2a35"}`, borderRadius:"12px",
        color:"#fff", fontSize:"15px", outline:"none", boxSizing:"border-box", transition:"border-color 0.2s",
      });
      const lbl = { fontSize:"10px", color:"#555", display:"block", marginBottom:"6px", textTransform:"uppercase", letterSpacing:"0.08em" };

      return (
        <div onClick={onCancel} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.9)", backdropFilter:"blur(14px)", zIndex:10500, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px", overflowY:"auto" }}>
          <div onClick={e => e.stopPropagation()} style={{ width:"100%", maxWidth:"420px", background:"#0d0d14", border:"1px solid #2a2a35", borderRadius:"28px", padding:"24px", boxShadow:"0 24px 80px rgba(0,0,0,0.9)" }}>

            <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:"20px" }}>
              <div>
                <h2 style={{ margin:0, fontSize:"17px", fontWeight:"800", color:"#fff" }}>⚙️ Ajustes de Perfil</h2>
                <p style={{ margin:"4px 0 0", fontSize:"11px", color:"#444" }}>Mifflin-St Jeor · TMB personalizada</p>
              </div>
              {preview && (
                <div style={{ textAlign:"right", flexShrink:0 }}>
                  <div style={{ fontSize:"19px", fontWeight:"800", color:"#00d4aa", lineHeight:1 }}>{preview.toLocaleString()}</div>
                  <div style={{ fontSize:"9px", color:"#444", marginTop:"2px" }}>kcal TDEE</div>
                </div>
              )}
            </div>

            <div style={{ marginBottom:"16px" }}>
              <label style={lbl}>Género</label>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px" }}>
                {[{ id:"male",label:"♂ Hombre" },{ id:"female",label:"♀ Mujer" }].map(g => (
                  <button type="button" key={g.id} onClick={() => set("gender", g.id)}
                    style={{ padding:"11px", borderRadius:"12px", border:`1px solid ${draft.gender===g.id?"#00d4aa":"#1a1a25"}`, background:draft.gender===g.id?"rgba(0,212,170,0.1)":"#161620", color:draft.gender===g.id?"#00d4aa":"#555", cursor:"pointer", fontWeight:"700", fontSize:"13px", transition:"all 0.2s" }}>
                    {g.label}
                  </button>
                ))}
              </div>
            </div>

            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"10px", marginBottom:"16px" }}>
              {[
                { key:"age",    label:"Edad",   unit:"años", min:15,  max:80  },
                { key:"weight", label:"Peso",   unit:"kg",   min:30,  max:300 },
                { key:"height", label:"Altura", unit:"cm",   min:100, max:250 },
              ].map(({ key, label, unit, min, max }) => {
                const err = fieldErr(key, min, max);
                return (
                  <div key={key}>
                    <label style={lbl}>{label} <span style={{ color:"#333" }}>({unit})</span></label>
                    <input type="number" value={draft[key]} min={min} max={max}
                      onChange={e => set(key, e.target.value)} style={iStyle(err)}
                      onFocus={e => !err&&(e.target.style.borderColor="#00d4aa")}
                      onBlur={e  => !err&&(e.target.style.borderColor="#2a2a35")} />
                    {err && <div style={{ fontSize:"9px", color:"#f87171", marginTop:"3px" }}>{min}–{max}</div>}
                  </div>
                );
              })}
            </div>

            <div style={{ marginBottom:"18px" }}>
              <label style={lbl}>Nivel de actividad</label>
              <div style={{ display:"flex", flexDirection:"column", gap:"5px" }}>
                {ACTIVITY_LEVELS.map((lvl, idx) => (
                  <button type="button" key={lvl.id} onClick={() => set("activity", idx)}
                    style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"9px 13px", borderRadius:"11px", border:`1px solid ${draft.activity===idx?"#00d4aa":"#1a1a25"}`, background:draft.activity===idx?"rgba(0,212,170,0.08)":"#161620", cursor:"pointer", transition:"all 0.2s", textAlign:"left" }}>
                    <div>
                      <span style={{ fontSize:"12px", fontWeight:"700", color:draft.activity===idx?"#00d4aa":"#ddd" }}>{lvl.label}</span>
                      <span style={{ fontSize:"10px", color:"#444", marginLeft:"8px" }}>{lvl.desc}</span>
                    </div>
                    <span style={{ fontSize:"10px", color:"#444", flexShrink:0, marginLeft:"8px" }}>×{lvl.factor}</span>
                  </button>
                ))}
              </div>
            </div>

            <div style={{ padding:"9px 13px", background:"rgba(255,255,255,0.02)", border:"1px solid #1a1a25", borderRadius:"11px", marginBottom:"16px" }}>
              <p style={{ margin:0, fontSize:"10px", color:"#444", lineHeight:"1.6" }}>
                <strong style={{ color:"#555" }}>Mifflin-St Jeor:</strong> (10×kg) + (6.25×cm) − (5×edad) {draft.gender==="male"?"+ 5 ♂":"− 161 ♀"} × factor actividad
              </p>
            </div>

            <div style={{ display:"flex", gap:"9px" }}>
              <button type="button" onClick={onCancel} style={{ flex:1, padding:"13px", borderRadius:"13px", background:"#1a1a25", color:"#666", border:"none", cursor:"pointer", fontSize:"14px" }}>Cancelar</button>
              <button type="button"
                onClick={() => isValid && onSave({ age:parseFloat(draft.age), weight:parseFloat(draft.weight), height:parseFloat(draft.height), gender:draft.gender, activity:draft.activity })}
                disabled={!isValid}
                style={{ flex:2, padding:"13px", borderRadius:"13px", background:isValid?"#00d4aa":"#1a1a25", color:isValid?"#000":"#444", fontWeight:"800", border:"none", cursor:isValid?"pointer":"not-allowed", fontSize:"14px", transition:"all 0.2s" }}>
                Guardar perfil
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── QUANTITY MODAL ───────────────────────────────────────────────────────
    function QuantityModal({ food, accentColor, accentBorder, onConfirm, onCancel }) {
      const [inputGrams, setInputGrams] = useState("100");
      const inputRef = useRef(null);
      useEffect(() => { const t = setTimeout(() => inputRef.current?.focus(), 80); return () => clearTimeout(t); }, []);

      const grams   = Math.max(1, parseFloat(inputGrams) || 0);
      const scaled  = scaleMacros(food, grams);
      const isValid = grams > 0 && grams <= 5000;

      return (
        <div onClick={onCancel} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.88)", backdropFilter:"blur(12px)", zIndex:11000, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px" }}>
          <div onClick={e => e.stopPropagation()} style={{ width:"100%", maxWidth:"400px", background:"#0d0d14", border:`1px solid ${accentBorder}`, borderRadius:"24px", padding:"26px", boxShadow:`0 20px 60px rgba(0,0,0,0.8), 0 0 0 1px ${accentColor}15` }}>
            <h3 style={{ color:"#fff", marginBottom:"4px", fontSize:"16px" }}>{food.emoji} {food.name}</h3>
            {food.brand && <p style={{ margin:"0 0 16px", fontSize:"11px", color:"#444" }}>{food.brand}</p>}
            {!food.brand && <div style={{ marginBottom:"16px" }} />}

            <div style={{ marginBottom:"16px" }}>
              <label style={{ fontSize:"11px", color:"#555", display:"block", marginBottom:"7px", textTransform:"uppercase", letterSpacing:"0.08em" }}>Gramos</label>
              <input ref={inputRef} type="number" value={inputGrams}
                onChange={e => { const v=e.target.value; if(v===""||/^\d*\.?\d*$/.test(v)) setInputGrams(v); }}
                onKeyDown={e => e.key==="Enter" && isValid && onConfirm({ ...scaled, id:`log-${Date.now()}-${Math.random().toString(36).substr(2,9)}`, loggedAt:new Date().toISOString() })}
                style={{ width:"100%", padding:"13px", background:"#161620", border:`1px solid ${accentBorder}`, borderRadius:"12px", color:"#fff", fontSize:"20px", outline:"none", boxSizing:"border-box" }} />
            </div>

            <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:"7px", marginBottom:"20px" }}>
              {[
                { label:"KCAL",  val:scaled.kcal,    u:"",  c:accentColor },
                { label:"PROT",  val:scaled.protein,  u:"g", c:"#3b82f6" },
                { label:"GRASA", val:scaled.fat,      u:"g", c:"#f59e0b" },
                { label:"CH",    val:scaled.carbs,    u:"g", c:"#a78bfa" },
              ].map(({ label,val,u,c }) => (
                <div key={label} style={{ background:"rgba(255,255,255,0.03)", padding:"9px 5px", borderRadius:"11px", textAlign:"center" }}>
                  <div style={{ fontSize:"9px", color:"#555", marginBottom:"3px" }}>{label}</div>
                  <div style={{ color:c, fontWeight:"700", fontSize:"13px" }}>{val}{u}</div>
                </div>
              ))}
            </div>

            <div style={{ display:"flex", gap:"9px" }}>
              <button type="button" onClick={onCancel} style={{ flex:1, padding:"12px", borderRadius:"12px", background:"#1a1a25", color:"#666", border:"none", cursor:"pointer" }}>Cancelar</button>
              <button type="button"
                onClick={() => isValid && onConfirm({ ...scaled, id:`log-${Date.now()}-${Math.random().toString(36).substr(2,9)}`, loggedAt:new Date().toISOString() })}
                disabled={!isValid}
                style={{ flex:2, padding:"12px", borderRadius:"12px", background:accentColor, color:"#000", fontWeight:"700", border:"none", cursor:isValid?"pointer":"not-allowed", opacity:isValid?1:0.45, transition:"opacity 0.2s" }}>
                Añadir al log
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── SUPPORTING UI ────────────────────────────────────────────────────────
    function MacroBar({ consumed, target, color }) {
      const pct = target > 0 ? Math.min((consumed / target) * 100, 100) : 0;
      const over = consumed > target && target > 0;
      return (
        <div style={{ height:"4px", background:"#1a1a25", borderRadius:"10px", overflow:"hidden", marginTop:"6px" }}>
          <div style={{ height:"100%", width:`${pct}%`, background:over?"#ff4d4d":color, transition:"width 0.5s ease", borderRadius:"10px" }} />
        </div>
      );
    }

    function GoalSelector({ goal, onChange }) {
      return (
        <div style={{ display:"flex", gap:"7px", marginBottom:"16px" }}>
          {GOAL_PROFILES.map(g => (
            <button type="button" key={g.id} onClick={() => onChange(g.id)}
              style={{ flex:1, padding:"12px 6px", borderRadius:"13px", border:`1px solid ${goal===g.id?g.color:"#1a1a25"}`, background:goal===g.id?g.gradient:"#0d0d14", cursor:"pointer", transition:"all 0.25s" }}>
              <div style={{ fontSize:"16px" }}>{g.emoji}</div>
              <div style={{ fontSize:"10px", color:goal===g.id?g.color:"#555", fontWeight:"700", marginTop:"4px" }}>{g.label}</div>
            </button>
          ))}
        </div>
      );
    }

    function FoodButton({ food, onSelect }) {
      return (
        <button type="button" onClick={() => onSelect({ ...food, id:String(food.id) })}
          style={{ display:"flex", alignItems:"center", gap:"10px", padding:"11px", background:"#161620", border:"1px solid #1a1a25", borderRadius:"13px", cursor:"pointer", textAlign:"left", width:"100%", transition:"border-color 0.2s" }}
          onMouseEnter={e => e.currentTarget.style.borderColor="#2a2a35"}
          onMouseLeave={e => e.currentTarget.style.borderColor="#1a1a25"}>
          <span style={{ fontSize:"19px", flexShrink:0 }}>{food.emoji}</span>
          <div style={{ overflow:"hidden" }}>
            <div style={{ fontSize:"12px", color:"#eee", fontWeight:"600", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{food.name}</div>
            {food.brand && <div style={{ fontSize:"9px", color:"#3a3a4a", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{food.brand}</div>}
            <div style={{ fontSize:"10px", color:"#555", marginTop:"1px" }}>{food.kcal} kcal/100g</div>
          </div>
        </button>
      );
    }

    function Toast({ message, visible, type="success" }) {
      const colors = { success:"#00d4aa", error:"#f87171", info:"#a78bfa" };
      return (
        <div style={{ position:"fixed", bottom:"28px", left:"50%", transform:`translateX(-50%) translateY(${visible?"0":"12px"})`, opacity:visible?1:0, transition:"opacity 0.3s ease, transform 0.3s ease", pointerEvents:"none", background:"#1a1a25", borderLeft:`3px solid ${colors[type]??colors.success}`, border:"1px solid #2a2a35", padding:"10px 20px", borderRadius:"50px", color:"#eee", fontSize:"13px", zIndex:20000, whiteSpace:"nowrap", boxShadow:"0 10px 30px rgba(0,0,0,0.5)" }}>
          {message}
        </div>
      );
    }

    function LogEntry({ entry, onDelete, accentColor }) {
      return (
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"9px 13px", background:"#161620", border:"1px solid #1a1a25", borderRadius:"12px" }}>
          <div style={{ display:"flex", alignItems:"center", gap:"10px", overflow:"hidden" }}>
            <span style={{ fontSize:"17px", flexShrink:0 }}>{entry.emoji}</span>
            <div style={{ overflow:"hidden" }}>
              <div style={{ fontSize:"12px", color:"#ddd", fontWeight:"600", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", maxWidth:"160px" }}>{entry.name}</div>
              <div style={{ fontSize:"10px", color:"#555" }}>{entry.grams}g · {entry.protein}g P · {entry.carbs}g C · {entry.fat}g G</div>
            </div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:"8px", flexShrink:0 }}>
            <span style={{ fontSize:"12px", fontWeight:"700", color:accentColor }}>{entry.kcal} kcal</span>
            <button type="button" onClick={() => onDelete(entry.id)}
              style={{ width:"21px", height:"21px", borderRadius:"50%", background:"#2a2a35", border:"none", color:"#666", cursor:"pointer", fontSize:"10px", display:"flex", alignItems:"center", justifyContent:"center", transition:"background 0.2s, color 0.2s" }}
              onMouseEnter={e => { e.currentTarget.style.background="#f87171"; e.currentTarget.style.color="#000"; }}
              onMouseLeave={e => { e.currentTarget.style.background="#2a2a35"; e.currentTarget.style.color="#666"; }}>✕</button>
          </div>
        </div>
      );
    }

    // ─── MASTER COMPONENT ─────────────────────────────────────────────────────
    function MacroApp() {
      const [profile,       setProfile]       = useState(() => loadProfile() || DEFAULTS);
      const [log,           setLog]           = useState(() => loadLog());
      const [goal,          setGoal]          = useState(() => ls.get(GOAL_KEY) || "maintain");
      const [profileOpen,   setProfileOpen]   = useState(false);
      const [scannerOpen,   setScannerOpen]   = useState(false);
      const [modalFood,     setModalFood]     = useState(null);
      const [searchTerm,    setSearchTerm]    = useState("");
      const [searchResults, setSearchResults] = useState([]);
      const [loading,       setLoading]       = useState(false);
      const [scanLoading,   setScanLoading]   = useState(false);
      const [toast,         setToast]         = useState({ show:false, msg:"", type:"success" });

      useEffect(() => { ls.set(PROFILE_KEY, profile); }, [profile]);
      useEffect(() => { ls.set(LOG_KEY,     log);     }, [log]);
      useEffect(() => { ls.set(GOAL_KEY,    goal);    }, [goal]);

      const targets = useMemo(() => {
        const { weight, height, age, gender, activity } = profile;
        const actFactor = ACTIVITY_LEVELS[activity]?.factor ?? 1.2;
        const base      = 10 * weight + 6.25 * height - 5 * age;
        const bmr       = gender === "male" ? base + 5 : base - 161;
        const tdee      = bmr * actFactor;
        const goalFac   = GOAL_PROFILES.find(g => g.id === goal)?.factor ?? 1.0;
        const kcal      = Math.round(tdee * goalFac);
        const protein   = Math.round(weight * 2);
        const fat       = parseFloat(((kcal * 0.25) / 9).toFixed(1));
        const carbs     = parseFloat(Math.max((kcal - protein*4 - fat*9) / 4, 0).toFixed(1));
        return { kcal, protein, fat, carbs };
      }, [profile, goal]);

      const totals = useMemo(() =>
        log.entries.reduce((acc, e) => ({
          kcal:    acc.kcal    + (e.kcal    || 0),
          protein: acc.protein + (e.protein || 0),
          fat:     acc.fat     + (e.fat     || 0),
          carbs:   acc.carbs   + (e.carbs   || 0),
        }), { kcal:0, protein:0, fat:0, carbs:0 }),
      [log.entries]);

      const activeGoal = useMemo(
        () => GOAL_PROFILES.find(g => g.id === goal) ?? GOAL_PROFILES[1],
        [goal]
      );

      const kcalPct        = targets.kcal > 0 ? Math.min((totals.kcal / targets.kcal) * 100, 100) : 0;
      const displayFoods   = searchResults.length > 0 ? searchResults : QUICK_FOODS;
      const isShowingSearch = searchResults.length > 0;

      const showToast = useCallback((msg, type="success") => {
        setToast({ show:true, msg, type });
        setTimeout(() => setToast(prev => ({ ...prev, show:false })), 3000);
      }, []);

      const handleSaveProfile = useCallback((newProfile) => {
        setProfile(newProfile);
        setProfileOpen(false);
        showToast("✅ Perfil actualizado — objetivos recalculados", "success");
      }, [showToast]);

      const handleAddFood = useCallback((scaledFood) => {
        setLog(prev => ({ ...prev, entries:[...prev.entries, scaledFood] }));
        setModalFood(null);
        setScannerOpen(false);
        showToast(`${scaledFood.emoji} Añadido al log`, "success");
      }, [showToast]);

      const handleDeleteEntry = useCallback((id) => {
        setLog(prev => ({ ...prev, entries:prev.entries.filter(e => e.id !== id) }));
        showToast("Entrada eliminada", "info");
      }, [showToast]);

      const abortRef = useRef(null);
      const handleSearch = useCallback(async () => {
        if (!searchTerm.trim()) return;
        abortRef.current?.abort();
        const ctrl = new AbortController();
        abortRef.current = ctrl;
        const tid = setTimeout(() => ctrl.abort(), OFF_TIMEOUT_MS);
        setLoading(true); setSearchResults([]);
        try {
          const results = await searchOFF(searchTerm, ctrl.signal);
          setSearchResults(results);
          if (results.length === 0) showToast("Sin resultados", "info");
        } catch(err) {
          if (err.name !== "AbortError") showToast("Error de conexión", "error");
        } finally { clearTimeout(tid); setLoading(false); }
      }, [searchTerm, showToast]);

      const handleClearSearch = useCallback(() => {
        setSearchResults([]); setSearchTerm(""); abortRef.current?.abort();
      }, []);

      const handleBarcodeDetected = useCallback(async (code) => {
        setScannerOpen(false);
        setScanLoading(true);
        showToast(`🏷️ Consultando ${code}…`, "info");
        try {
          const food = await lookupBarcode(code);
          if (food) {
            setModalFood(food);
          } else {
            showToast("Producto no encontrado en OpenFoodFacts", "error");
          }
        } catch(_) {
          showToast("Error al consultar el producto", "error");
        } finally {
          setScanLoading(false);
        }
      }, [showToast]);

      return (
        <div style={{ minHeight:"100vh", background:"#09090e", color:"#eee", padding:"20px 20px 80px", fontFamily:"'Inter', system-ui, sans-serif" }}>
          <div style={{ maxWidth:"480px", margin:"0 auto" }}>

            {/* ── Header ── */}
            <header style={{ marginBottom:"24px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <h1 style={{ fontSize:"21px", fontWeight:"800", letterSpacing:"-0.03em", color:"#fff", margin:0 }}>
                  Mi Día <span style={{ color:"#333", fontWeight:"400" }}>/ Macros</span>
                </h1>
                <p style={{ margin:"3px 0 0", fontSize:"11px", color:"#333", letterSpacing:"0.04em" }}>
                  {new Date().toLocaleDateString("es-ES", { weekday:"long", day:"numeric", month:"long" })}
                </p>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontSize:"19px", fontWeight:"800", color:activeGoal.color, lineHeight:1 }}>{Math.round(totals.kcal)}</div>
                  <div style={{ fontSize:"10px", color:"#444" }}>/ {targets.kcal} kcal</div>
                </div>
                <button type="button" onClick={() => setProfileOpen(true)} title="Configurar perfil"
                  style={{ width:"36px", height:"36px", borderRadius:"11px", background:"#161620", border:"1px solid #2a2a35", cursor:"pointer", fontSize:"15px", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, transition:"border-color 0.2s" }}
                  onMouseEnter={e => e.currentTarget.style.borderColor="#00d4aa"}
                  onMouseLeave={e => e.currentTarget.style.borderColor="#2a2a35"}>
                  ⚙️
                </button>
              </div>
            </header>

            {/* ── Dashboard ── */}
            <section style={{ background:"#0d0d14", padding:"18px", borderRadius:"24px", border:`1px solid ${activeGoal.border}`, marginBottom:"16px", boxShadow:`0 0 40px ${activeGoal.color}08` }}>
              <GoalSelector goal={goal} onChange={setGoal} />

              <div style={{ marginBottom:"14px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", fontSize:"11px", color:"#555", marginBottom:"6px" }}>
                  <span>Calorías consumidas</span>
                  <span style={{ color:totals.kcal>targets.kcal?"#f87171":"#eee" }}>{Math.round(kcalPct)}%</span>
                </div>
                <div style={{ height:"7px", background:"#1a1a25", borderRadius:"10px", overflow:"hidden" }}>
                  <div style={{ height:"100%", width:`${kcalPct}%`, background:totals.kcal>targets.kcal?"#ff4d4d":activeGoal.color, boxShadow:`0 0 10px ${activeGoal.color}55`, transition:"width 0.5s ease", borderRadius:"10px" }} />
                </div>
              </div>

              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:"8px" }}>
                {[
                  { label:"Proteínas",  consumed:totals.protein, target:targets.protein, color:"#3b82f6" },
                  { label:"Carbohidr.", consumed:totals.carbs,   target:targets.carbs,   color:"#a78bfa" },
                  { label:"Grasas",     consumed:totals.fat,     target:targets.fat,     color:"#f59e0b" },
                ].map(m => (
                  <div key={m.label} style={{ background:"#161620", padding:"10px", borderRadius:"13px", border:"1px solid #1a1a25" }}>
                    <div style={{ fontSize:"9px", color:"#444", marginBottom:"2px", textTransform:"uppercase", letterSpacing:"0.05em" }}>{m.label}</div>
                    <div style={{ fontSize:"13px", fontWeight:"700", color:m.consumed>m.target&&m.target>0?"#ff4d4d":m.color }}>
                      {m.consumed.toFixed(0)}<span style={{ fontSize:"9px", color:"#555" }}>/{m.target>0?Math.round(m.target):"–"}g</span>
                    </div>
                    <MacroBar consumed={m.consumed} target={m.target} color={m.color} />
                  </div>
                ))}
              </div>
            </section>

            {/* ── Buscador + Escáner ── */}
            <div style={{ marginBottom:"16px" }}>
              <div style={{ display:"flex", gap:"8px", alignItems:"center" }}>
                <div style={{ position:"relative", flex:1 }}>
                  <input placeholder="Busca un alimento real…"
                    value={searchTerm} onChange={e => setSearchTerm(e.target.value)}
                    onKeyDown={e => e.key==="Enter" && handleSearch()}
                    style={{ width:"100%", padding:"13px 88px 13px 15px", background:"#161620", border:"1px solid #1a1a25", borderRadius:"15px", color:"#fff", fontSize:"14px", outline:"none", boxSizing:"border-box", transition:"border-color 0.2s" }}
                    onFocus={e => e.target.style.borderColor=activeGoal.border}
                    onBlur={e  => e.target.style.borderColor="#1a1a25"} />
                  <div style={{ position:"absolute", right:"6px", top:"50%", transform:"translateY(-50%)", display:"flex", gap:"5px" }}>
                    {isShowingSearch && (
                      <button type="button" onClick={handleClearSearch} style={{ padding:"6px 8px", borderRadius:"8px", background:"#2a2a35", border:"none", color:"#888", cursor:"pointer", fontSize:"10px" }}>✕</button>
                    )}
                    <button type="button" onClick={handleSearch} disabled={loading}
                      style={{ padding:"7px 11px", borderRadius:"10px", background:activeGoal.color, border:"none", color:"#000", cursor:"pointer", fontSize:"12px", fontWeight:"700", opacity:loading?0.7:1, transition:"opacity 0.2s" }}>
                      {loading?"…":"🔍"}
                    </button>
                  </div>
                </div>

                <button type="button" onClick={() => setScannerOpen(true)} disabled={scanLoading}
                  title="Escanear código de barras"
                  style={{ flexShrink:0, width:"48px", height:"48px", borderRadius:"15px", background:"#161620", border:`1px solid ${scanLoading?"#00d4aa":"#2a2a35"}`, color:scanLoading?"#00d4aa":"#777", cursor:"pointer", fontSize:"17px", display:"flex", alignItems:"center", justifyContent:"center", transition:"all 0.2s", letterSpacing:"-1px", fontWeight:"900" }}
                  onMouseEnter={e => { if(!scanLoading){ e.currentTarget.style.borderColor="#00d4aa"; e.currentTarget.style.color="#00d4aa"; }}}
                  onMouseLeave={e => { if(!scanLoading){ e.currentTarget.style.borderColor="#2a2a35"; e.currentTarget.style.color="#777"; }}}>
                  {scanLoading ? "…" : "▐▌▌"}
                </button>
              </div>

              {isShowingSearch && (
                <p style={{ fontSize:"11px", color:"#444", margin:"7px 0 0 3px" }}>
                  {searchResults.length} resultado{searchResults.length!==1?"s":""} para «{searchTerm}»
                </p>
              )}
            </div>

            {/* ── Alimentos ── */}
            <div style={{ marginBottom:"24px" }}>
              <div style={{ fontSize:"11px", color:"#444", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:"10px" }}>
                {isShowingSearch ? "Resultados" : "Alimentos rápidos"}
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px" }}>
                {displayFoods.map(f => <FoodButton key={f.id} food={f} onSelect={setModalFood} />)}
              </div>
            </div>

            {/* ── Comidas de hoy ── */}
            <section>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"10px" }}>
                <div style={{ fontSize:"11px", color:"#444", textTransform:"uppercase", letterSpacing:"0.08em" }}>Comidas de hoy</div>
                <div style={{ fontSize:"11px", color:"#333" }}>{log.entries.length} {log.entries.length===1?"ítem":"ítems"}</div>
              </div>

              {log.entries.length === 0 ? (
                <div style={{ padding:"26px 20px", textAlign:"center", background:"#0d0d14", border:"1px dashed #1a1a25", borderRadius:"16px" }}>
                  <div style={{ fontSize:"24px", marginBottom:"7px", opacity:0.3 }}>🍽️</div>
                  <div style={{ fontSize:"12px", color:"#333" }}>Aún no has registrado nada hoy</div>
                </div>
              ) : (
                <div style={{ display:"flex", flexDirection:"column", gap:"6px" }}>
                  {log.entries.map(entry => (
                    <LogEntry key={entry.id} entry={entry} onDelete={handleDeleteEntry} accentColor={activeGoal.color} />
                  ))}
                  <div style={{ marginTop:"4px", padding:"10px 14px", background:`${activeGoal.color}10`, border:`1px solid ${activeGoal.border}`, borderRadius:"13px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <span style={{ fontSize:"10px", color:"#555", letterSpacing:"0.04em" }}>TOTAL DEL DÍA</span>
                    <div style={{ display:"flex", gap:"13px" }}>
                      {[
                        { label:"kcal",  val:Math.round(totals.kcal),          c:activeGoal.color },
                        { label:"prot",  val:`${totals.protein.toFixed(0)}g`,   c:"#3b82f6" },
                        { label:"ch",    val:`${totals.carbs.toFixed(0)}g`,     c:"#a78bfa" },
                        { label:"grasa", val:`${totals.fat.toFixed(0)}g`,       c:"#f59e0b" },
                      ].map(({ label,val,c }) => (
                        <div key={label} style={{ textAlign:"center" }}>
                          <div style={{ fontSize:"12px", fontWeight:"700", color:c }}>{val}</div>
                          <div style={{ fontSize:"9px", color:"#444" }}>{label}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}
            </section>

          </div>

          {/* ── Modals ── */}
          {scannerOpen  && <BarcodeScannerModal onDetected={handleBarcodeDetected} onCancel={() => setScannerOpen(false)} />}
          {profileOpen  && <ProfileModal profile={profile} onSave={handleSaveProfile} onCancel={() => setProfileOpen(false)} />}
          {modalFood    && <QuantityModal food={modalFood} accentColor={activeGoal.color} accentBorder={activeGoal.border} onConfirm={handleAddFood} onCancel={() => setModalFood(null)} />}
          <Toast visible={toast.show} message={toast.msg} type={toast.type} />
        </div>
      );
    }

    // ─── MOUNT ────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<MacroApp />);
  </script>
</body>
</html>
